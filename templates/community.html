{% extends "base.html" %}
{% block title %}Community Hub | EduPredict AI{% endblock %}

{% block extra_css %}
<style>
    .community-container { max-width: 900px; margin: 4rem auto 10rem; padding: 0 20px; }
    
    .forum-header { text-align: center; margin-bottom: 4rem; }
    .forum-header h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -1.5px; }

    .input-panel { margin-bottom: 4rem; padding: 2.5rem; border-radius: 30px; }
    .input-panel textarea {
        width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
        border-radius: 20px; padding: 1.5rem; color: white; font-size: 1.1rem;
        resize: none; outline: none; transition: 0.3s; margin-bottom: 1.5rem;
    }
    .input-panel textarea:focus { border-color: var(--primary); background: rgba(0,0,0,0.3); }

    .feed-container { display: flex; flex-direction: column; gap: 2rem; }
    
    .post-card { border-radius: 28px; padding: 2.5rem; animation: revealUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    
    .post-header { display: flex; align-items: center; gap: 15px; margin-bottom: 1.5rem; }
    .post-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; }
    .post-user-info { display: flex; flex-direction: column; }
    .post-user-name { font-weight: 700; font-size: 1.15rem; color: white; }
    .post-time { font-size: 0.85rem; color: var(--sub-text); font-weight: 500; }

    .post-content { font-size: 1.1rem; line-height: 1.7; color: rgba(255,255,255,0.95); white-space: pre-wrap; }

    .live-dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #10B981; }

    @keyframes revealUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}

{% block content %}
<div class="community-container">
    <div class="forum-header reveal">
        <h1 style="margin-bottom: 1rem;">Community <span style="color: var(--primary);">Hub</span></h1>
        <p style="color: var(--sub-text); font-size: 1.2rem;"><span class="live-dot"></span> Live discussions from across Maharashtra</p>
    </div>

    <div class="glass-card input-panel reveal">
        <textarea id="queryInput" rows="3" placeholder="Share your admission query or update..."></textarea>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <p style="font-size: 0.85rem; color: var(--sub-text); font-weight: 500;">Please follow community guidelines.</p>
            <button class="btn-cta" onclick="submitPost()">Broadcast Post →</button>
        </div>
    </div>

    <div id="feed" class="feed-container">
        <!-- Dashboard Loader -->
        <div style="text-align: center; color: var(--sub-text); padding: 4rem;">Loading encrypted feed...</div>
    </div>
</div>

<script>
    async function fetchPosts() {
        try {
            const response = await fetch('/api/posts');
            const posts = await response.json();
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            posts.forEach((post, idx) => {
                const postEl = document.createElement('div');
                postEl.className = 'glass-card post-card reveal';
                postEl.style.animationDelay = `${idx * 0.1}s`;
                postEl.innerHTML = `
                    <div class="post-header">
                        <img src="${post.profile_pic || 'https://via.placeholder.com/50'}" class="post-avatar">
                        <div class="post-user-info">
                            <span class="post-user-name">${post.user_name}</span>
                            <span class="post-time">${post.timestamp}</span>
                        </div>
                    </div>
                    <div class="post-content">${post.query}</div>
                `;
                feed.appendChild(postEl);
            });
            reveal();
        } catch (e) { console.error("Feed error:", e); }
    }

    async function submitPost() {
        const query = document.getElementById('queryInput').value;
        if (!query) return;

        try {
            const response = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });

            if (response.ok) {
                document.getElementById('queryInput').value = '';
                fetchPosts();
            } else {
                window.location.href = '/login';
            }
        } catch (e) { alert("Session expired. Please re-login."); }
    }

    // Initial load
    fetchPosts();
</script>
{% endblock %}
